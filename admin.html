<div class="container mt-5">
    <h2 class="text-center mb-4">Quản lý sản phẩm</h2>
    <input id="name" class="form-control mb-3" placeholder="Tên sản phẩm">
    <input id="price" class="form-control mb-3" placeholder="Giá">
    <input id="category" class="form-control mb-3" placeholder="Danh mục">
    <input id="image" class="form-control mb-3" placeholder="Link ảnh">
    <textarea
        id="description"
        class="form-control mb-3"
        placeholder="Mô tả">
    </textarea>
    <input id="stock" class="form-control mb-3" placeholder="Số lượng">
    <button class="btn btn-success" id="btnAdd">
        Thêm sản phẩm
    </button>
    <hr>
    <input
    type="text"
    id="search"
    class="form-control mb-3"
    placeholder="Tìm kiếm sản phẩm..."
    >
    <div id="admin-list"></div>
</div>
<script src="js/admin.js"></script>
